name: spellcheck
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # Enforce en-us spell check
  spellcheck:
    name: Run spellcheck
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Spellcheck
        uses: jonasbn/github-action-spellcheck@0.63.0
